<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — Admin — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-14: ADMIN — USER MANAGEMENT -->
<div id="navbar-placeholder"></div>

<main class="py-4">
  <div class="container">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small">
        <li class="breadcrumb-item"><a href="admin-dashboard.html">Admin Dashboard</a></li>
        <li class="breadcrumb-item active">User Management</li>
      </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <div>
        <h2 class="fw-bold mb-0">&#128100; User Management</h2>
        <p class="text-muted small mb-0">View, search, and moderate all platform users.</p>
      </div>
      <span class="role-badge role-Admin fs-7 py-2 px-3">Admin Only</span>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4" id="user-stats"></div>

    <!-- Filters Bar -->
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body p-3 d-flex flex-wrap gap-3 align-items-center">
        <div style="width:260px;">
          <input type="text" class="form-control form-control-sm" id="search-users" placeholder="&#128269; Search by name or email…">
        </div>
        <div class="btn-group btn-group-sm" id="role-filter">
          <button class="btn btn-outline-secondary active" data-role="all">All Roles</button>
          <button class="btn btn-outline-success"   data-role="Participant">Participant</button>
          <button class="btn btn-outline-primary"   data-role="Organizer">Organizer</button>
          <button class="btn btn-outline-danger"    data-role="Admin">Admin</button>
        </div>
        <div class="btn-group btn-group-sm" id="status-filter">
          <button class="btn btn-outline-secondary active" data-status="all">All Status</button>
          <button class="btn btn-outline-success"   data-status="active">Active</button>
          <button class="btn btn-outline-danger"    data-status="banned">Banned</button>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0 align-middle">
            <thead>
              <tr>
                <th>User</th>
                <th>Major</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-transparent py-2">
        <small class="text-muted" id="result-count"></small>
      </div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  if (!await guardPage(['Admin'])) return;

  let allUsers = [];
  try { allUsers = await apiGet('/api/admin/users'); } catch (_) {}

  let activeRole   = 'all';
  let activeStatus = 'all';
  let searchTerm   = '';

  function getFiltered() {
    let users = allUsers;
    if (activeRole   !== 'all') users = users.filter(u => u.role === activeRole);
    if (activeStatus !== 'all') users = users.filter(u => u.status === activeStatus);
    if (searchTerm) users = users.filter(u =>
      (u.name  || '').toLowerCase().includes(searchTerm) ||
      (u.email || '').toLowerCase().includes(searchTerm) ||
      (u.major || '').toLowerCase().includes(searchTerm)
    );
    return users;
  }

  function renderStats() {
    const total      = allUsers.length;
    const active     = allUsers.filter(u => u.status === 'active').length;
    const banned     = allUsers.filter(u => u.status === 'banned').length;
    const organizers = allUsers.filter(u => u.role === 'Organizer').length;
    document.getElementById('user-stats').innerHTML = `
      <div class="col-6 col-md-3">
        <div class="stat-card bg-white shadow-sm">
          <div class="fw-bold text-primary display-6">${total}</div>
          <div class="text-muted small">Total Users</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card bg-white shadow-sm">
          <div class="fw-bold text-success display-6">${active}</div>
          <div class="text-muted small">Active</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card bg-white shadow-sm">
          <div class="fw-bold text-danger display-6">${banned}</div>
          <div class="text-muted small">Banned</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card bg-white shadow-sm">
          <div class="fw-bold text-info display-6">${organizers}</div>
          <div class="text-muted small">Organizers</div>
        </div>
      </div>`;
  }

  function render() {
    const users = getFiltered();
    renderUserRows('users-tbody', users);
    document.getElementById('result-count').textContent =
      `Showing ${users.length} user${users.length !== 1 ? 's' : ''}`;
  }

  document.getElementById('role-filter').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#role-filter button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeRole = this.dataset.role;
      render();
    });
  });

  document.getElementById('status-filter').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#status-filter button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeStatus = this.dataset.status;
      render();
    });
  });

  document.getElementById('search-users').addEventListener('input', function() {
    searchTerm = this.value.toLowerCase().trim();
    render();
  });

  renderStats();
  render();
})();
</script>
</body>
</html>
