<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-08: PARTICIPANT DASHBOARD -->
<div id="navbar-placeholder"></div>

<main class="py-4">
  <div class="container">

    <!-- Welcome Banner -->
    <div id="welcome-banner" class="card border-0 shadow-sm mb-4" style="background:linear-gradient(135deg,var(--wsu-crimson),#c0392b); color:#fff;">
      <div class="card-body p-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h3 class="fw-bold mb-1" id="welcome-name">Welcome back!</h3>
          <p class="mb-0 opacity-75" id="welcome-subtitle">Here's an overview of your study group activity.</p>
        </div>
        <a href="groups-list.html" class="btn btn-light fw-semibold">Browse More Groups</a>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-4" id="stats-row">
      <!-- Populated by JS -->
    </div>

    <div class="row g-4">
      <!-- Main: My Joined Groups -->
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold section-header mb-0">&#128101; My Joined Groups</h5>
          <a href="groups-list.html" class="btn btn-sm btn-outline-secondary">Find More</a>
        </div>
        <div class="row" id="joined-groups-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Sidebar -->
      <div class="col-lg-4">
        <!-- Pending Requests -->
        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-white border-bottom fw-bold py-3">
            &#9203; My Pending Requests
          </div>
          <div class="card-body p-0">
            <ul class="list-group list-group-flush" id="pending-list">
              <!-- Populated by JS -->
            </ul>
          </div>
        </div>

        <!-- Quick Links -->
        <div class="card border-0 shadow-sm">
          <div class="card-body p-3">
            <h6 class="fw-bold mb-3">Quick Links</h6>
            <nav class="sidebar-nav">
              <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="groups-list.html">&#128269; Browse Groups</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">&#128100; My Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="auth-login.html">&#128274; Switch Account</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  if (!await guardPage()) return;  // must be logged in

  const user = window._sgpUser;
  const role = user?.role || 'Participant';

  document.getElementById('welcome-name').textContent     = `Welcome back, ${user?.name?.split(' ')[0] || 'Student'}!`;
  document.getElementById('welcome-subtitle').textContent = `You're signed in as ${role}. Here's your study group activity.`;

  let groups = [];
  try { groups = await apiGet('/api/groups'); } catch (_) {}

  const joinedGroups   = groups.filter(g => g.isMember && g.status === 'active');
  const pendingGroups  = groups.filter(g => g.hasPendingRequest);
  const virtualJoined  = joinedGroups.filter(g => g.format === 'virtual').length;
  const courses        = new Set(joinedGroups.map(g => g.course)).size;

  document.getElementById('stats-row').innerHTML = `
    <div class="col-6 col-md-3">
      <div class="stat-card bg-white shadow-sm">
        <div class="fw-bold text-wsu display-6">${joinedGroups.length}</div>
        <div class="text-muted small">Groups Joined</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card bg-white shadow-sm">
        <div class="fw-bold text-primary display-6">${pendingGroups.length}</div>
        <div class="text-muted small">Pending Requests</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card bg-white shadow-sm">
        <div class="fw-bold text-success display-6">${courses}</div>
        <div class="text-muted small">Courses</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card bg-white shadow-sm">
        <div class="fw-bold text-secondary display-6">${virtualJoined}</div>
        <div class="text-muted small">Virtual Groups</div>
      </div>
    </div>`;

  if (joinedGroups.length === 0) {
    document.getElementById('joined-groups-grid').innerHTML = `
      <div class="col-12">
        <div class="text-center py-5 text-muted">
          <div class="display-5 mb-3">&#128218;</div>
          <h5>You haven't joined any groups yet.</h5>
          <p class="small">Browse available study groups and join ones that match your courses.</p>
          <a href="groups-list.html" class="btn btn-wsu mt-2">Browse Groups</a>
        </div>
      </div>`;
  } else {
    renderGroupsGrid('joined-groups-grid', joinedGroups);
  }

  const pendingEl = document.getElementById('pending-list');
  if (pendingGroups.length === 0) {
    pendingEl.innerHTML = `<li class="list-group-item text-muted small fst-italic py-3 text-center">No pending requests.</li>`;
  } else {
    pendingEl.innerHTML = pendingGroups.map(g => `
      <li class="list-group-item py-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="small fw-semibold">${g.name}</div>
            <div class="text-muted" style="font-size:.75rem;">${g.course}</div>
          </div>
          <span class="badge badge-pending">&#8987; Pending</span>
        </div>
        <a href="group-detail-private.html?id=${g.id}" class="btn btn-sm btn-outline-secondary mt-2">View Group</a>
      </li>`).join('');
  }
})();
</script>
</body>
</html>
