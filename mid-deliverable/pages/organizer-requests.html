<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Requests — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-11: ORGANIZER — JOIN REQUESTS MANAGEMENT -->
<div id="navbar-placeholder"></div>

<main class="py-4">
  <div class="container">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small">
        <li class="breadcrumb-item"><a href="dashboard-organizer.html">My Dashboard</a></li>
        <li class="breadcrumb-item active">Join Requests</li>
      </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <div>
        <h2 class="fw-bold mb-0">&#9203; Join Requests</h2>
        <p class="text-muted small mb-0">Review and manage all membership requests for your groups.</p>
      </div>
      <a href="dashboard-organizer.html" class="btn btn-outline-secondary btn-sm">&larr; Back to Dashboard</a>
    </div>

    <!-- Stats pills -->
    <div class="d-flex gap-2 mb-4 flex-wrap" id="request-stats"></div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body p-3 d-flex gap-3 flex-wrap align-items-center">
        <label class="small fw-semibold mb-0">Filter:</label>
        <div class="btn-group btn-group-sm" role="group" id="status-filter">
          <button type="button" class="btn btn-outline-secondary active" data-status="all">All</button>
          <button type="button" class="btn btn-outline-warning"    data-status="pending">Pending</button>
          <button type="button" class="btn btn-outline-success"   data-status="approved">Approved</button>
          <button type="button" class="btn btn-outline-danger"    data-status="rejected">Rejected</button>
        </div>
        <div class="ms-auto">
          <input type="text" class="form-control form-control-sm" id="search-req" placeholder="Search by name…" style="width:180px;">
        </div>
      </div>
    </div>

    <!-- Requests Table -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0 align-middle">
            <thead>
              <tr>
                <th>Applicant</th>
                <th>Group</th>
                <th>Message</th>
                <th>Status / Date</th>
                <th style="min-width:150px;">Actions</th>
              </tr>
            </thead>
            <tbody id="requests-tbody">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  if (!await guardPage(['Organizer', 'Admin'])) return;

  let allRequests = [];
  try { allRequests = await apiGet('/api/join-requests'); }
  catch (_) {}

  const countOf = s => allRequests.filter(r => r.status === s).length;
  document.getElementById('request-stats').innerHTML = `
    <span class="badge bg-secondary fs-7 py-2 px-3">Total: ${allRequests.length}</span>
    <span class="badge bg-warning text-dark fs-7 py-2 px-3">Pending: ${countOf('pending')}</span>
    <span class="badge bg-success fs-7 py-2 px-3">Approved: ${countOf('approved')}</span>
    <span class="badge bg-danger fs-7 py-2 px-3">Rejected: ${countOf('rejected')}</span>`;

  let activeStatus = 'all';
  let searchTerm   = '';

  function getFiltered() {
    let reqs = allRequests;
    if (activeStatus !== 'all') reqs = reqs.filter(r => r.status === activeStatus);
    if (searchTerm) reqs = reqs.filter(r =>
      (r.userName  || '').toLowerCase().includes(searchTerm) ||
      (r.groupName || '').toLowerCase().includes(searchTerm) ||
      (r.userEmail || '').toLowerCase().includes(searchTerm)
    );
    return reqs;
  }

  async function render() {
    try { allRequests = await apiGet('/api/join-requests'); } catch (_) {}
    renderRequestRows('requests-tbody', getFiltered());
  }

  document.getElementById('status-filter').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#status-filter button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeStatus = this.dataset.status;
      renderRequestRows('requests-tbody', getFiltered());
    });
  });

  document.getElementById('search-req').addEventListener('input', function() {
    searchTerm = this.value.toLowerCase().trim();
    renderRequestRows('requests-tbody', getFiltered());
  });

  renderRequestRows('requests-tbody', getFiltered());
})();
</script>
</body>
</html>
