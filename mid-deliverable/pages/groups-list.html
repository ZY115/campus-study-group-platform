<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Study Groups — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-04: GROUP LISTING PAGE -->
<div id="navbar-placeholder"></div>

<main class="py-4">
  <div class="container">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <div>
        <h2 class="fw-bold mb-0">Browse Study Groups</h2>
        <p class="text-muted small mb-0">Find a group for your course — join now or request access</p>
      </div>
      <div id="create-btn-area"></div>
    </div>

    <div class="row g-4">
      <!-- Sidebar Filters -->
      <div class="col-md-3">
        <div class="card border-0 shadow-sm sticky-top" style="top:80px;">
          <div class="card-body p-3">
            <h6 class="fw-bold mb-3 section-header">&#128269; Filter Groups</h6>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Search</label>
              <input type="text" class="form-control form-control-sm" id="filter-search" placeholder="Course code or name…">
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Format</label>
              <div class="d-flex flex-column gap-1">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="format" id="fmt-all" value="all" checked>
                  <label class="form-check-label small" for="fmt-all">All formats</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="format" id="fmt-person" value="in-person">
                  <label class="form-check-label small" for="fmt-person">&#128205; In-Person</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="format" id="fmt-virtual" value="virtual">
                  <label class="form-check-label small" for="fmt-virtual">&#128187; Virtual</label>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Visibility</label>
              <div class="d-flex flex-column gap-1">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="vis-public" value="public" checked>
                  <label class="form-check-label small" for="vis-public">&#127758; Public</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="vis-private" value="private" checked>
                  <label class="form-check-label small" for="vis-private">&#128274; Private</label>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Sort By</label>
              <select class="form-select form-select-sm" id="sort-by">
                <option value="name">Name (A–Z)</option>
                <option value="members">Members (high to low)</option>
                <option value="created">Newest first</option>
              </select>
            </div>

            <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetFilters()">Clear Filters</button>
          </div>
        </div>
      </div>

      <!-- Groups Grid -->
      <div class="col-md-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="text-muted small" id="result-count"></span>
        </div>
        <div class="row" id="groups-container">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  const role = getCurrentRole();

  if (role === 'Organizer' || role === 'Admin') {
    document.getElementById('create-btn-area').innerHTML =
      `<a href="group-create.html" class="btn btn-wsu">+ Create Group</a>`;
  }

  let allGroups = [];
  try {
    allGroups = await apiGet('/api/groups');
  } catch (_) {
    document.getElementById('groups-container').innerHTML =
      '<div class="col-12"><div class="alert alert-danger">Failed to load groups. Is the server running?</div></div>';
    return;
  }

  function getFiltered() {
    const search     = document.getElementById('filter-search').value.toLowerCase().trim();
    const fmtVal     = document.querySelector('input[name="format"]:checked').value;
    const pubChecked  = document.getElementById('vis-public').checked;
    const privChecked = document.getElementById('vis-private').checked;
    const sortBy     = document.getElementById('sort-by').value;

    let groups = allGroups;
    if (role !== 'Admin') groups = groups.filter(g => g.status === 'active');

    if (search) groups = groups.filter(g =>
      g.name.toLowerCase().includes(search) ||
      g.course.toLowerCase().includes(search) ||
      g.description.toLowerCase().includes(search) ||
      (Array.isArray(g.tags) && g.tags.some(t => t.toLowerCase().includes(search)))
    );
    if (fmtVal !== 'all') groups = groups.filter(g => g.format === fmtVal);

    const visFilter = [];
    if (pubChecked)  visFilter.push('public');
    if (privChecked) visFilter.push('private');
    if (visFilter.length) groups = groups.filter(g => visFilter.includes(g.visibility));

    return [...groups].sort((a, b) => {
      if (sortBy === 'members') return (b.memberCount || 0) - (a.memberCount || 0);
      if (sortBy === 'created') return new Date(b.createdAt) - new Date(a.createdAt);
      return a.name.localeCompare(b.name);
    });
  }

  function applyFilters() {
    const groups = getFiltered();
    document.getElementById('result-count').textContent =
      `Showing ${groups.length} group${groups.length !== 1 ? 's' : ''}`;
    renderGroupsGrid('groups-container', groups);
  }

  window.resetFilters = function() {
    document.getElementById('filter-search').value = '';
    document.getElementById('fmt-all').checked     = true;
    document.getElementById('vis-public').checked  = true;
    document.getElementById('vis-private').checked = true;
    document.getElementById('sort-by').value       = 'name';
    applyFilters();
  };

  ['filter-search', 'sort-by'].forEach(id =>
    document.getElementById(id).addEventListener('input', applyFilters));
  document.querySelectorAll('input[name="format"]').forEach(r =>
    r.addEventListener('change', applyFilters));
  document.querySelectorAll('#vis-public, #vis-private').forEach(c =>
    c.addEventListener('change', applyFilters));

  applyFilters();
})();
</script>
</body>
</html>
