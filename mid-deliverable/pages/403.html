<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 Forbidden — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-16: 403 FORBIDDEN / ACCESS DENIED PAGE -->
<div id="navbar-placeholder"></div>

<main>
  <div class="error-page">
    <div class="container text-center py-5">

      <div class="error-code mb-2">403</div>
      <h2 class="fw-bold mb-2">Access Denied</h2>
      <p class="text-muted mb-4" id="denied-msg">
        Your current role does not have permission to view this page.
      </p>

      <!-- Role indicator -->
      <div class="mb-4">
        <p class="small text-muted mb-2">You are currently signed in as:</p>
        <span class="role-badge fs-6 py-2 px-4" id="current-role-badge">Loading…</span>
      </div>

      <!-- Denied from info -->
      <div class="alert alert-light border d-inline-block mb-4 small" id="denied-from-info">
        <!-- Populated by JS -->
      </div>

      <!-- Actions -->
      <div class="d-flex justify-content-center gap-3 flex-wrap mb-5">
        <button class="btn btn-outline-secondary" onclick="history.back()">&larr; Go Back</button>
        <a href="index.html" class="btn btn-wsu">Return to Home</a>
        <a href="auth-login.html" class="btn btn-outline-primary">Switch Account</a>
      </div>

      <div class="card border-0 shadow-sm d-inline-block mx-auto p-3" style="min-width:280px;" id="denied-extra"></div>

    </div>
  </div>
</main>

<footer class="site-footer mt-0">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  const user   = window._sgpUser;
  const role   = user?.role || 'Guest';
  const denied = sessionStorage.getItem('sgp_denied_from') || '';

  const badge = document.getElementById('current-role-badge');
  badge.className = `role-badge fs-6 py-2 px-4 role-${role}`;
  badge.textContent = role;

  const roleMap = { Participant: 'Participant pages only', Organizer: 'Participant + Organizer pages', Admin: 'All pages' };
  document.getElementById('denied-from-info').innerHTML = denied
    ? `You tried to access: <strong>${denied.split('/').pop()}</strong><br>Your role (<strong>${role}</strong>) can access: <em>${roleMap[role] || '—'}</em>`
    : `Your role (<strong>${role}</strong>) can access: <em>${roleMap[role] || '—'}</em>`;

  document.getElementById('denied-msg').textContent =
    role === 'Participant' ? 'Participants cannot access Organizer or Admin pages.'
    : role === 'Organizer' ? 'Organizers cannot access Admin-only pages.'
    : 'This page is restricted. Please log in with the appropriate account.';
})();
</script>
</body>
</html>
