<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Group — StudyGroup WSU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- S-12: ORGANIZER — GROUP MANAGEMENT / EDIT PAGE -->
<div id="navbar-placeholder"></div>

<main class="py-4">
  <div class="container">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small">
        <li class="breadcrumb-item"><a href="dashboard-organizer.html">My Dashboard</a></li>
        <li class="breadcrumb-item active" id="bc-name">Manage Group</li>
      </ol>
    </nav>

    <div id="page-root">
      <!-- Populated by JS -->
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="small mb-0 text-muted">&copy; 2026 StudyGroup WSU &bull; CPTS 489 Prototype</p>
  </div>
</footer>

<!-- Danger Modal -->
<div class="modal fade" id="cancelModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Confirm Group Cancellation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to <strong>remove this group</strong>? This will remove all member access and cannot be undone by you (only an Admin can restore it).</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Keep Group</button>
        <button type="button" class="btn btn-danger" id="confirm-cancel-btn">Yes, Remove Group</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
(async () => {
  await initApp();
  if (!await guardPage(['Organizer', 'Admin'])) return;

  const groupId = getParam('id');
  if (!groupId) { window.location.href = 'dashboard-organizer.html'; return; }

  let group;
  try { group = await apiGet(`/api/groups/${groupId}`); }
  catch (err) {
    document.getElementById('page-root').innerHTML =
      err.status === 404
        ? `<div class="alert alert-warning">Group not found. <a href="dashboard-organizer.html">Return to dashboard</a></div>`
        : `<div class="alert alert-danger">Could not load group.</div>`;
    return;
  }

  if (!group.isOrganizer && window._sgpUser?.role !== 'Admin') {
    window.location.href = '403.html'; return;
  }

  document.getElementById('bc-name').textContent = group.name;
  document.title = `Manage: ${group.name} — StudyGroup WSU`;

  const members = group.memberDetails || [];

  document.getElementById('page-root').innerHTML = `
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div>
        <h2 class="fw-bold mb-0">Manage Group</h2>
        <p class="text-muted small mb-0">${group.name}</p>
      </div>
      <div class="d-flex gap-2">
        <a href="group-detail.html?id=${group.id}" class="btn btn-sm btn-outline-secondary">View Public Page</a>
        <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#cancelModal">Remove Group</button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-white border-bottom fw-bold py-3">&#9998; Edit Group Details</div>
          <div class="card-body p-4">
            <form id="edit-form" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">Group Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="edit-name" value="${group.name}" required maxlength="80">
                <div class="invalid-feedback">Group name is required.</div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                <textarea class="form-control" id="edit-desc" rows="4" required minlength="10">${group.description}</textarea>
                <div class="invalid-feedback">Description is required (min 10 chars).</div>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Schedule <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="edit-schedule" value="${group.schedule}" required>
                  <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Max Size</label>
                  <input type="number" class="form-control" id="edit-maxsize" value="${group.maxSize}" min="${group.memberCount}" max="50">
                  <div class="form-text">Minimum: ${group.memberCount} (current members)</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Location</label>
                <input type="text" class="form-control" id="edit-location" value="${group.location}"
                  placeholder="${group.format === 'virtual' ? 'N/A for virtual groups' : 'Building and Room'}">
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Virtual Meeting Link</label>
                <input type="url" class="form-control" id="edit-link" value="${group.meetingLink}" placeholder="https://zoom.us/j/...">
                <div class="form-text">Update if your Zoom/Teams link changes.</div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Visibility</label>
                <div class="d-flex gap-3">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="edit-vis" id="ev-public" value="public" ${group.visibility === 'public' ? 'checked' : ''}>
                    <label class="form-check-label" for="ev-public">&#127758; Public</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="edit-vis" id="ev-private" value="private" ${group.visibility === 'private' ? 'checked' : ''}>
                    <label class="form-check-label" for="ev-private">&#128274; Private</label>
                  </div>
                </div>
              </div>
              <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-wsu px-5">Save Changes</button>
                <a href="dashboard-organizer.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-bottom fw-bold py-3">&#128172; Post Group Update</div>
          <div class="card-body p-4">
            <p class="text-muted small mb-2">Broadcast a message to all group members in the discussion thread.</p>
            <textarea class="form-control mb-2" id="update-text" rows="2"
              placeholder="e.g. Meeting location changed to Holland 303 this week…"></textarea>
            <button class="btn btn-sm btn-outline-primary" onclick="postUpdate()">Post Update</button>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-white border-bottom fw-bold py-3">
            &#128101; Members (${group.memberCount}/${group.maxSize})
          </div>
          <div class="card-body p-0">
            <ul class="list-group list-group-flush">
              ${members.map(m => `
                <li class="list-group-item d-flex align-items-center gap-2 py-2">
                  <div class="avatar-circle" style="background:${m.isOrganizer?'#0d6efd':'#198754'}; width:30px;height:30px;font-size:.65rem;">
                    ${m.avatar}
                  </div>
                  <div class="flex-grow-1">
                    <div class="small fw-semibold">${m.name} ${m.isOrganizer ? '<span class="badge bg-secondary" style="font-size:.55rem;">Org</span>' : ''}</div>
                    <div class="text-muted" style="font-size:.7rem;">${m.major || ''}</div>
                  </div>
                  ${!m.isOrganizer ? `
                    <button class="btn btn-xs btn-outline-danger" style="font-size:.7rem; padding:.15rem .4rem;"
                      onclick="removeMemberAction(${m.id}, '${m.name.replace(/'/g, "\\'")}')">
                      Remove
                    </button>` : ''}
                </li>`).join('')}
            </ul>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-3">
            <h6 class="fw-bold mb-2 section-header">Group Info</h6>
            <dl class="small mb-0">
              <dt class="text-muted">Course</dt><dd>${group.course}</dd>
              <dt class="text-muted">Format</dt><dd>${formatBadge(group.format)}</dd>
              <dt class="text-muted">Created</dt><dd>${fmtDate(group.createdAt)}</dd>
              <dt class="text-muted">Status</dt><dd>${statusBadge(group.status)}</dd>
            </dl>
            <a href="organizer-requests.html" class="btn btn-sm btn-outline-primary w-100 mt-3">Manage Join Requests</a>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    this.classList.add('was-validated');
    if (!this.checkValidity()) return;
    const payload = {
      name:        document.getElementById('edit-name').value.trim(),
      description: document.getElementById('edit-desc').value.trim(),
      schedule:    document.getElementById('edit-schedule').value.trim(),
      maxSize:     parseInt(document.getElementById('edit-maxsize').value, 10),
      location:    document.getElementById('edit-location').value.trim(),
      meetingLink: document.getElementById('edit-link').value.trim(),
      visibility:  document.querySelector('input[name="edit-vis"]:checked').value,
    };
    const btn = this.querySelector('[type="submit"]');
    btn.disabled = true;
    try {
      await apiPut(`/api/groups/${groupId}`, payload);
      showToast('Group updated successfully! &#10003;', 'success');
      setTimeout(() => location.reload(), 900);
    } catch (err) {
      showToast(err.message || 'Failed to update.', 'danger');
      btn.disabled = false;
    }
  });

  window.postUpdate = async function() {
    const text = document.getElementById('update-text').value.trim();
    if (!text) { showToast('Please enter a message.', 'warning'); return; }
    try {
      await apiPost(`/api/groups/${groupId}/comments`, { text });
      showToast('Update posted to discussion thread!', 'success');
      document.getElementById('update-text').value = '';
    } catch (err) {
      showToast(err.message || 'Failed to post.', 'danger');
    }
  };

  window.removeMemberAction = async function(memberId, memberName) {
    if (!confirm(`Remove ${memberName} from this group?`)) return;
    try {
      await apiDelete(`/api/groups/${groupId}/members/${memberId}`);
      showToast(`${memberName} removed from the group.`, 'info');
      setTimeout(() => location.reload(), 900);
    } catch (err) {
      showToast(err.message || 'Failed to remove member.', 'danger');
    }
  };

  document.getElementById('confirm-cancel-btn').addEventListener('click', async function() {
    this.disabled = true;
    try {
      await apiPut(`/api/groups/${groupId}`, { status: 'removed' });
      showToast('Group has been removed.', 'warning');
      setTimeout(() => window.location.href = 'dashboard-organizer.html', 900);
    } catch (err) {
      showToast(err.message || 'Failed to remove group.', 'danger');
      this.disabled = false;
    }
  });
})();
</script>
</body>
</html>
